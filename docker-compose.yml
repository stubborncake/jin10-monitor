services:
  monitor:
    build: .
    container_name: jin10-monitor
    restart: always
    environment:
      - TZ=Asia/Shanghai
    env_file:
      - .env
    volumes:
      # 挂载配置文件（修改配置无需重新构建镜像）
      - ./config.yaml:/app/config.yaml:ro
      # 持久化数据目录（数据库 + 日志统一放这里）
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/monitor.log && test \"$$(stat -c %Y /app/monitor.log)\" -gt \"$$(date -d '3 minutes ago' +%s)\""]
      interval: 60s
      timeout: 10s
      retries: 2
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
