services:
  monitor:
    build: .
    container_name: jin10-monitor
    restart: always
    environment:
      - TZ=Asia/Shanghai
    env_file:
      - .env
    volumes:
      # 挂载配置文件（修改配置无需重新构建镜像）
      - ./config.yaml:/app/config.yaml:ro
      # 持久化 SQLite 去重数据库（容器重启不丢记录）
      - ./jin10_monitor.db:/app/jin10_monitor.db
      - ./jin10_monitor.db-shm:/app/jin10_monitor.db-shm
      - ./jin10_monitor.db-wal:/app/jin10_monitor.db-wal
      # 持久化日志
      - ./monitor.log:/app/monitor.log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
